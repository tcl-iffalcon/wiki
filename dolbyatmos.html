// Global Aktif Liste Durumu
let currentListType = 'atmos';

const GENRE_CLASS={
"Aksiyon":"b-aksiyon","Bilim Kurgu":"b-bilimkurgu","Macera":"b-macera",
"Savaş":"b-savas","Korku":"b-korku","Dram":"b-dram","Animasyon":"b-animasyon",
"Müzik":"b-muzik","Gerilim":"b-gerilim","Fantastik":"b-fantastik",
"Tarih":"b-tarih","Suç":"b-suc"
};

const PT_CLASS={
"Prime":"pt-prime","Netflix":"pt-netflix","TV+":"pt-tvplus",
"Max":"pt-max","Disney+":"pt-disney","TOD":"pt-tod","Stream":"pt-tvplus","MUBI":"pt-mubi"
};
const PT_LABEL={
"Prime":"Amazon Prime","Netflix":"Netflix","TV+":"TV+",
"Max":"Max","Disney+":"Disney+","TOD":"TOD TV","Stream":"Stream","MUBI":"MUBI"
};

function getActiveList() {
  if (currentListType === 'genelSes') return GENEL_SES_MOVIES;
  if (currentListType === 'tavan') return TAVAN_MOVIES;
  if (currentListType === 'bas') return BAS_MOVIES;
  return MOVIES;
}

function renderPlatforms(p){
  if(!p||p.length===0) return '<span class="pt-none">Yalnızca kiralık/satın alma</span>';
  return p.map(x=>`<span class="platform-tag ${PT_CLASS[x]||'pt-none'}">${PT_LABEL[x]||x}</span>`).join('');
}

function render(list){
  const grid=document.getElementById('grid');
  const noRes=document.getElementById('noResults');
  document.getElementById('count').textContent=list.length;
  if(list.length===0){grid.innerHTML='';noRes.style.display='';return;}
  noRes.style.display='none';
  grid.innerHTML=list.map(m=>`
    <div class="card">
      <div class="rank${m.r<=3?' top3':''}">${m.r}</div>
      <div class="info">
        <div class="title">${m.n}</div>
        <div class="meta">${m.y}</div>
        ${m.t ? `<div class="note">💡 ${m.t}</div>` : ''}
        <div class="badges"><span class="badge ${GENRE_CLASS[m.g]||''}">${m.g}</span></div>
      </div>
      <div class="platform-col">${renderPlatforms(m.p)}</div>
    </div>
  `).join('');
}

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const g=document.getElementById('genre').value;
  const pf=document.getElementById('platform').value;
  
  const activeList = getActiveList();
  
  const res=activeList.filter(m=>{
    const matchQ=!q||m.n.toLowerCase().includes(q);
    const matchG=!g||m.g===g;
    const matchP=!pf||(m.p && m.p.some(x=>x.includes(pf)||pf.includes(x)));
    return matchQ&&matchG&&matchP;
  });
  render(res);
}

function switchList(type) {
  currentListType = type;
  
  // Tab butonlarının aktifliğini değiştirme
  const buttons = document.querySelectorAll('.tab-btn');
  buttons.forEach(btn => btn.classList.remove('active'));
  
  const titles = {
    'atmos': { t: "🎧 Top 100 Dolby Atmos Film", s: "Bağımsız incelemeler, YouTube kanalları ve audiofil forumlarına göre konsensüs sıralaması." },
    'genelSes': { t: "🔊 En İyi Genel Ses Kalitesine Sahip Filmler", s: "Film&Ses topluluğu ve YouTube kanalının genel ses performansı yüksek yapımlar listesi." },
    'tavan': { t: "🪂 En İyi Tavan Hoparlörü Kullanımına Sahip Filmler", s: "Dolby Atmos ve DTS:X sistemlerde üst/tavan (overhead) kanalları en efektif kullanan filmler." },
    'bas': { t: "🎸 En İyi Bas (Subwoofer) Filmleri", s: "Derin alt frekanslara (LFE) inen, ev sinemasında subwoofer ünitelerini zorlayan en iyi yapımlar." }
  };
  
  document.getElementById('mainTitle').textContent = titles[type].t;
  document.getElementById('mainSubtitle').textContent = titles[type].s;
  
  // Tıklanan butonu aktif yap
  const index = ['atmos', 'genelSes', 'tavan', 'bas'].indexOf(type);
  buttons[index].classList.add('active');
  
  // Filtreleri temizle ve listeyi yeniden render et
  document.getElementById('search').value = '';
  document.getElementById('genre').value = '';
  document.getElementById('platform').value = '';
  
  filter();
}

// İlk açılış renderı
render(MOVIES);
